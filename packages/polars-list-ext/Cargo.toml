[package]
name = "polars-list-ext"
version = "0.14.0-dev.1"
edition = "2024"

[lib]
name = "polars_list_ext"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.23.5", features = ["extension-module", "abi3-py38"] }
pyo3-polars = { version = "0.20.0", features = ["derive"] }
serde = { version = "1.0.219", features = ["derive"] }
polars = { version = "0.46.0", features = [
    "dtype-struct",
    "dtype-i8",
    "dtype-u8",
    "dtype-u16",
    "dtype-i16",
] }
polars-arrow = { version = "0.46.0" }
realfft = "3.4.0"
butterworth = "0.1.0"
interp = "2.0.2"
num-traits = "0.2.19"
thiserror = "2.0.12"
