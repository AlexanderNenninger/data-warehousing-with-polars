[project]
name = "polars-list-ext"
authors = [{ name = "Travis Hammond", email = "dashdeckers@gmail.com" }]
description = "Utilities for working with List columns in Polars"
readme = "README.md"
dynamic = ["version"]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
    "Operating System :: OS Independent",
]
requires-python = ">=3.12"
dependencies = ["polars >= 1.23.0"]

[project.optional-dependencies]
dev = ["maturin >= 1.0, < 2.0", "numpy >= 2.2.3", "matplotlib >= 3.4.0"]

[build-system]
build-backend = "maturin"
requires = ["maturin >= 1.0, < 2.0"]

[tool.maturin]
module-name = "polars_list_ext._internal"
