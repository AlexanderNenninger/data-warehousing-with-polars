name: Munich Monatszahlen Pipeline

on:
  schedule:
    # Run on the 5th of every month at 09:00 UTC — giving the Statistisches Amt
    # a few days after month-end to publish the updated Monatszahlen CSVs.
    - cron: "0 9 5 * *"
  workflow_dispatch: # allow manual trigger from the Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: python -m pip install uv

      - name: Install package
        run: uv sync --package data-warehousing-with-polars

      - name: Run pipeline
        run: uv run python app/munich_monatszahlen.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MUNICH_CYCLING_BUCKET: ${{ secrets.MUNICH_CYCLING_BUCKET || 'data-warehousing-with-polars' }}
