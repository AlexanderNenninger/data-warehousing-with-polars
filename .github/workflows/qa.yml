name: QA

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  qa:
    name: "Lint & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --all-extras

      - name: Lint
        run: uv run poe lint

      - name: Typecheck
        run: uv run poe typecheck

  test:
    name: "Test / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.15.0-beta.2"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --package data-warehousing-with-polars --all-extras

      - name: Run tests
        run: uv run poe test

  test_memory:
    name: "Test memory / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.15.0-beta.2"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --package data-warehousing-with-polars --all-extras

      - name: Run memory tests
        run: uv run poe test_memory

  test_ext:
    name: "Test polars-list-ext / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.15.0-beta.2"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --package polars-list-ext --all-extras

      - name: Build Rust extension
        run: uv run poe ext_build

      - name: Run tests
        run: uv run poe test_ext

  test_cloud:
    name: "Test cloud / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14", "3.15.0-beta.2"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --package data-warehousing-with-polars --all-extras

      - name: Run cloud tests
        run: uv run poe test_cloud
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MUNICH_CYCLING_BUCKET: ${{ secrets.MUNICH_CYCLING_BUCKET }}
